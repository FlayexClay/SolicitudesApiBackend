services:
  postgres:
    image: postgres:16-alpine
    container_name: solicitudes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: solicitudes_db
      POSTGRES_USER: solicitudes_user
      POSTGRES_PASSWORD: solicitudes_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solicitudes_user -d solicitudes_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: